spring.application.name=demo1

# 1. Tell H2 to store data in a file in your home directory (~/kanban_db)
spring.datasource.url=jdbc:h2:file:~/Coding/java/kanban_db/kanban_db;DB_CLOSE_DELAY=-1

# 2. Database credentials
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# 3. Let Hibernate automatically update your database tables when your Java code changes
spring.jpa.hibernate.ddl-auto=create-drop

# 4. Optional: Show the exact SQL queries Spring is running in your terminal log
spring.jpa.show-sql=true